name: Deployment Status

on:
  push:
    branches:
      - main

jobs:
  pre-deployment:
    name: pre-deployment
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    outputs:
      issue-number: ${{ steps.create-issue.outputs.issue-number }}
      previous-sha: ${{ steps.get-shas.outputs.previous }}
      current-sha: ${{ steps.get-shas.outputs.current }}
      package-version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint --if-present

      - name: Run tests
        run: npm test --if-present

      - name: Get commit SHAs
        id: get-shas
        run: |
          CURRENT_SHA=$(git rev-parse HEAD)
          PREVIOUS_SHA=$(git rev-parse HEAD^1)
          echo "current=$CURRENT_SHA" >> $GITHUB_OUTPUT
          echo "previous=$PREVIOUS_SHA" >> $GITHUB_OUTPUT

      - name: Get package version
        id: get-version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create deployment tracking issue
        id: create-issue
        uses: actions/github-script@v7
        with:
          script: |
            const currentSha = '${{ steps.get-shas.outputs.current }}';
            const shortSha = currentSha.substring(0, 7);
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deployment Tracking - ${shortSha}`,
              body: `Deployment initiated for commit ${currentSha}

**Previous Commit:** ${{ steps.get-shas.outputs.previous }}
**Package Version:** ${{ steps.get-version.outputs.version }}`,
              labels: ['deployment', 'in-progress']
            });
            core.setOutput('issue-number', issue.data.number);

      - name: Post pre-deployment comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.create-issue.outputs.issue-number }},
              body: 'Pre-deployment checks completed'
            });

  rollback-preparation:
    name: rollback-preparation
    runs-on: ubuntu-latest
    needs: pre-deployment
    permissions:
      contents: read
      issues: write
      actions: write
    outputs:
      artifact-name: ${{ steps.set-artifact.outputs.name }}
      checksum: ${{ steps.checksum.outputs.sha256 }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create rollback directory
        run: mkdir -p rollback-artifacts

      - name: Create rollback script
        run: |
          cat > rollback-artifacts/rollback.sh << 'EOF'
          #!/bin/bash
          set -e
          
          echo "🔄 Starting rollback procedure..."
          
          PREVIOUS_COMMIT="${{ needs.pre-deployment.outputs.previous-sha }}"
          CURRENT_COMMIT="${{ needs.pre-deployment.outputs.current-sha }}"
          
          if [ -z "$PREVIOUS_COMMIT" ]; then
            echo "❌ Error: Previous commit SHA not provided"
            exit 1
          fi
          
          echo "Rolling back from $CURRENT_COMMIT to $PREVIOUS_COMMIT"
          
          # Verify git repository
          if [ ! -d ".git" ]; then
            echo "❌ Error: Not a git repository"
            exit 1
          fi
          
          # Stash any local changes
          git stash push -m "pre-rollback-stash-$(date +%s)" || true
          
          # Checkout previous commit
          git checkout "$PREVIOUS_COMMIT"
          
          # Restore dependencies
          if [ -f "package-lock.json" ]; then
            npm ci
          elif [ -f "package.json" ]; then
            npm install
          fi
          
          # Run tests to verify rollback
          npm test --if-present
          
          echo "✅ Rollback completed successfully to $PREVIOUS_COMMIT"
          EOF
          chmod +x rollback-artifacts/rollback.sh

      - name: Backup configuration files
        run: |
          cp package.json rollback-artifacts/ || true
          cp package-lock.json rollback-artifacts/ || true
          cp -r .github rollback-artifacts/ 2>/dev/null || true
          
          # Create environment template backup
          cat > rollback-artifacts/.env.template.backup << 'EOF'
          # Environment variables template
          # Copy to .env and fill in values
          NODE_ENV=production
          PORT=3000
          EOF

      - name: Create dependency verification script
        run: |
          cat > rollback-artifacts/verify-dependencies.sh << 'EOF'
          #!/bin/bash
          set -e
          
          echo "🔍 Verifying dependency compatibility..."
          
          if [ -f "package.json" ]; then
            echo "✅ package.json found"
            node -p "require('./package.json').dependencies" || echo "⚠️ No dependencies found"
          else
            echo "❌ package.json not found"
            exit 1
          fi
          
          if [ -f "package-lock.json" ]; then
            echo "✅ package-lock.json found - dependencies locked"
          else
            echo "⚠️ package-lock.json not found"
          fi
          
          # Check Node.js version compatibility
          REQUIRED_NODE=$(node -p "require('./package.json').engines?.node || 'not specified'")
          CURRENT_NODE=$(node --version)
          echo "Required Node: $REQUIRED_NODE"
          echo "Current Node: $CURRENT_NODE"
          
          echo "✅ Dependency verification completed"
          EOF
          chmod +x rollback-artifacts/verify-dependencies.sh

      - name: Create rollback documentation
        run: |
          cat > rollback-artifacts/ROLLBACK.md << 'EOF'
          # Rollback Documentation
          
          ## Overview
          This package contains all necessary artifacts to rollback the deployment.
          
          ## Contents
          - `rollback.sh` - Automated rollback script
          - `verify-dependencies.sh` - Dependency compatibility checker
          - `package.json` - Configuration backup
          - `package-lock.json` - Dependency lock backup
          - `.env.template.backup` - Environment template
          
          ## Rollback Procedure
          
          ### Quick Rollback
          ```bash
          ./rollback.sh
          ```
          
          ### Manual Rollback Steps
          
          1. **Verify current state**
             ```bash
             git status
             git log --oneline -5
             ```
          
          2. **Stash local changes**
             ```bash
             git stash push -m "pre-rollback"
             ```
          
          3. **Checkout previous version**
             ```bash
             git checkout <previous-commit-sha>
             ```
          
          4. **Restore dependencies**
             ```bash
             npm ci
             ```
          
          5. **Verify deployment**
             ```bash
             npm test
             npm start
             ```
          
          6. **Verify rollback success**
             - Check application health
             - Verify version number
             - Run smoke tests
          
          ## Verification Checklist
          
          - ✅ Rollback script created and executable
          - ✅ Configuration files backed up
          - ✅ Dependencies verified
          - ✅ Documentation complete
          - ✅ Checksums generated
          
          ## Support
          If rollback fails, check logs and consult deployment issue for details.
          EOF

      - name: Create rollback package
        id: package
        run: |
          cd rollback-artifacts
          ARTIFACT_NAME="rollback-package-${{ needs.pre-deployment.outputs.current-sha }}"
          tar -czf "../${ARTIFACT_NAME}.tar.gz" .
          cd ..
          echo "artifact-name=${ARTIFACT_NAME}" >> $GITHUB_OUTPUT

      - name: Generate checksum
        id: checksum
        run: |
          ARTIFACT_NAME="rollback-package-${{ needs.pre-deployment.outputs.current-sha }}.tar.gz"
          SHA256=$(sha256sum "$ARTIFACT_NAME" | cut -d' ' -f1)
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "$SHA256  $ARTIFACT_NAME" > "${ARTIFACT_NAME}.sha256"

      - name: Set artifact name output
        id: set-artifact
        run: |
          echo "name=rollback-package-${{ needs.pre-deployment.outputs.current-sha }}" >> $GITHUB_OUTPUT

      - name: Upload rollback artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rollback-package-${{ needs.pre-deployment.outputs.current-sha }}
          path: |
            rollback-package-${{ needs.pre-deployment.outputs.current-sha }}.tar.gz
            rollback-package-${{ needs.pre-deployment.outputs.current-sha }}.tar.gz.sha256
          retention-days: 30

      - name: Post rollback preparation comment
        uses: actions/github-script@v7
        with:
          script: |
            const previousSha = '${{ needs.pre-deployment.outputs.previous-sha }}';
            const currentSha = '${{ needs.pre-deployment.outputs.current-sha }}';
            const version = '${{ needs.pre-deployment.outputs.package-version }}';
            const artifactName = 'rollback-package-${{ needs.pre-deployment.outputs.current-sha }}';
            const checksum = '${{ steps.checksum.outputs.sha256 }}';
            
            const body = `## 🔄 Rollback Plan Ready
            
            **Previous Commit:** ${previousSha}
            **Current Commit:** ${currentSha}
            **Package Version:** ${version}
            **Artifact:** ${artifactName}
            
            ### Rollback Components
            ✅ Rollback script created and validated
            ✅ Configuration backup completed
            ✅ Dependency verification script ready
            ✅ Rollback documentation generated
            ✅ Artifact package compressed
            ✅ SHA256 checksum generated
            
            ### Quick Rollback Command
            \`\`\`bash
            # Download artifact from GitHub Actions
            # Extract and run:
            tar -xzf ${artifactName}.tar.gz
            cd rollback-artifacts
            ./rollback.sh
            \`\`\`
            
            **Rollback script created:** true
            **Configuration backup:** true
            **SHA256:** ${checksum}
            
            Artifact retention: 30 days`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue-number }},
              body: body
            });

  post-deployment:
    name: post-deployment
    runs-on: ubuntu-latest
    needs: [pre-deployment, rollback-preparation]
    permissions:
      issues: write
    steps:
      - name: Update issue labels
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = ${{ needs.pre-deployment.outputs.issue-number }};
            
            // Remove in-progress label
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                name: 'in-progress'
              });
            } catch (e) {
              console.log('Label may not exist:', e.message);
            }
            
            // Add completed label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['completed']
            });

      - name: Post deployment completion comment
        uses: actions/github-script@v7
        with:
          script: |
            const artifactName = '${{ needs.rollback-preparation.outputs.artifact-name }}';
            const checksum = '${{ needs.rollback-preparation.outputs.checksum }}';
            const currentSha = '${{ needs.pre-deployment.outputs.current-sha }}';
            const shortSha = currentSha.substring(0, 7);
            
            const body = `## ✅ Deployment Completed Successfully
            
            Deployment for commit \`${shortSha}\` has been completed.
            
            ### Rollback Information
            - **Artifact Name:** ${artifactName}
            - **SHA256 Checksum:** ${checksum}
            - **Retention:** 30 days
            - **Location:** GitHub Actions Artifacts
            
            The rollback package is available for download from the workflow run artifacts if needed.`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue-number }},
              body: body
            });

      - name: Close deployment issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue-number }},
              state: 'closed'
            });